name: Receber base PCM por dispatch

on:
  repository_dispatch:
    types:
      - pcm_base_chunk
      - pcm_base_finalize

permissions:
  contents: write
  actions: read

jobs:
  importar-base:
    runs-on: ubuntu-latest

    steps:
      - name: Preparar chunk recebido
        if: ${{ github.event.action == 'pcm_base_chunk' }}
        id: preparar_chunk
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import json
          import base64
          import pathlib
          import re

          event_path = os.environ["GITHUB_EVENT_PATH"]

          with open(event_path, "r", encoding="utf-8") as f:
              event = json.load(f)

          payload = event.get("client_payload", {})

          base_name = payload.get("base_name", "base_ordens")
          lote_id = payload.get("lote_id")
          target_path = payload.get("target_path", "base/base_ordens.json")
          part_index = int(payload.get("part_index", 0))
          total_parts = int(payload.get("total_parts", 0))
          chunk_b64 = payload.get("chunk_b64", "")

          if not lote_id:
              raise Exception("Payload sem lote_id.")

          if not part_index:
              raise Exception("Payload sem part_index.")

          if not total_parts:
              raise Exception("Payload sem total_parts.")

          if not chunk_b64:
              raise Exception("Payload sem chunk_b64.")

          out = pathlib.Path("chunk_payload")
          out.mkdir(exist_ok=True)

          chunk_bytes = base64.b64decode(chunk_b64.encode("utf-8"))

          meta = {
              "base_name": base_name,
              "lote_id": lote_id,
              "target_path": target_path,
              "part_index": part_index,
              "total_parts": total_parts
          }

          (out / "meta.json").write_text(
              json.dumps(meta, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          (out / "chunk.part").write_bytes(chunk_bytes)

          def safe(value):
              return re.sub(r"[^A-Za-z0-9_.-]", "-", str(value))

          artifact_name = f"pcm-base-{safe(base_name)}-{safe(lote_id)}-{part_index}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"artifact_name={artifact_name}\n")

          print(f"Chunk {part_index}/{total_parts} preparado.")
          print(f"Artifact: {artifact_name}")
          PY

      - name: Salvar chunk como artifact
        if: ${{ github.event.action == 'pcm_base_chunk' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.preparar_chunk.outputs.artifact_name }}
          path: chunk_payload/
          retention-days: 1
          if-no-files-found: error

      - name: Baixar repositório para finalizar
        if: ${{ github.event.action == 'pcm_base_finalize' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Montar arquivo final pelos artifacts
        if: ${{ github.event.action == 'pcm_base_finalize' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'PY'
          import os
          import json
          import pathlib
          import time
          import urllib.request
          import urllib.error
          import zipfile
          import io
          import hashlib

          event_path = os.environ["GITHUB_EVENT_PATH"]
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]

          with open(event_path, "r", encoding="utf-8") as f:
              event = json.load(f)

          payload = event.get("client_payload", {})

          base_name = payload.get("base_name", "base_ordens")
          lote_id = payload.get("lote_id")
          target_path = payload.get("target_path", "base/base_ordens.json")
          total_parts = int(payload.get("total_parts", 0))

          if not lote_id:
              raise Exception("Payload sem lote_id.")

          if not total_parts:
              raise Exception("Payload sem total_parts.")

          prefix = f"pcm-base-{base_name}-{lote_id}-"

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "pcm-base-importer"
          }

          def api_get_json(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def api_get_bytes(url):
              class NoRedirect(urllib.request.HTTPRedirectHandler):
                  def redirect_request(self, req, fp, code, msg, headers_response, newurl):
                      return None

              opener = urllib.request.build_opener(NoRedirect)
          
              req = urllib.request.Request(url, headers=headers)
          
              try:
                  with opener.open(req) as resp:
                      return resp.read()
          
              except urllib.error.HTTPError as e:
                  if e.code in (301, 302, 303, 307, 308):
                      location = e.headers.get("Location")
          
                      if not location:
                          raise Exception("GitHub retornou redirecionamento sem Location.")
          
                      print("Artifact gerou URL temporária. Baixando arquivo redirecionado sem Authorization.")
          
                      req2 = urllib.request.Request(
                          location,
                          headers={
                              "User-Agent": "pcm-base-importer"
                          }
                      )
          
                      with urllib.request.urlopen(req2) as resp:
                          return resp.read()
          
                  raise

          def listar_artifacts():
              artifacts = []
              page = 1

              while True:
                  url = f"https://api.github.com/repos/{repo}/actions/artifacts?per_page=100&page={page}"
                  data = api_get_json(url)
                  batch = data.get("artifacts", [])

                  if not batch:
                      break

                  artifacts.extend(batch)

                  if len(batch) < 100:
                      break

                  page += 1

              encontrados = {}

              for artifact in artifacts:
                  name = artifact.get("name", "")

                  if not name.startswith(prefix):
                      continue

                  if artifact.get("expired"):
                      continue

                  try:
                      index = int(name.replace(prefix, "").split("-")[0])
                  except Exception:
                      continue

                  antigo = encontrados.get(index)

                  if not antigo or artifact.get("created_at", "") > antigo.get("created_at", ""):
                      encontrados[index] = artifact

              return encontrados

          max_attempts = 90
          sleep_seconds = 10
          encontrados = {}

          print(f"Aguardando artifacts do lote {lote_id}.")
          print(f"Prefixo: {prefix}")
          print(f"Total esperado: {total_parts}")

          for attempt in range(1, max_attempts + 1):
              encontrados = listar_artifacts()
              print(f"Tentativa {attempt}/{max_attempts}: {len(encontrados)}/{total_parts} artifacts encontrados.")

              if len(encontrados) >= total_parts:
                  break

              time.sleep(sleep_seconds)

          if len(encontrados) < total_parts:
              faltantes = [str(i) for i in range(1, total_parts + 1) if i not in encontrados]
              raise Exception(
                  f"Tempo esgotado. Chegaram {len(encontrados)}/{total_parts}. "
                  f"Faltantes: {', '.join(faltantes[:100])}"
              )

          parts = []

          for index in range(1, total_parts + 1):
              artifact = encontrados[index]
              artifact_id = artifact["id"]
              zip_url = f"https://api.github.com/repos/{repo}/actions/artifacts/{artifact_id}/zip"

              zip_bytes = api_get_bytes(zip_url)

              with zipfile.ZipFile(io.BytesIO(zip_bytes)) as z:
                  meta = json.loads(z.read("meta.json").decode("utf-8"))
                  chunk = z.read("chunk.part")

              if int(meta["part_index"]) != index:
                  raise Exception(f"Artifact fora de ordem. Esperado {index}, veio {meta['part_index']}.")

              parts.append(chunk)

          content = b"".join(parts)

          try:
              json.loads(content.decode("utf-8-sig"))
          except Exception as e:
              raise Exception(f"Arquivo final não é JSON válido: {e}")

          target = pathlib.Path(target_path)
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(content)

          sha256 = hashlib.sha256(content).hexdigest()

          print(f"Arquivo final salvo em: {target_path}")
          print(f"Tamanho final: {len(content)} bytes")
          print(f"SHA256: {sha256}")
          PY

      - name: Commitar arquivo final
        if: ${{ github.event.action == 'pcm_base_finalize' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase || true

          if [ -z "$(git status --porcelain)" ]; then
            echo "Nenhuma alteração para commit."
            exit 0
          fi

          git add -A
          git commit -m "Atualização automática base PCM finalizada"
          git push
